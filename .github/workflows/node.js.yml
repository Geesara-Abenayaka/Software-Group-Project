name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    # 1. Build Frontend (at root)
    - name: Install Frontend Dependencies & Build
      run: |
        npm ci
        npm run build --if-present

    # 2. Setup and Restart Backend (inside /server)
    - name: Setup Backend Environment
      working-directory: ./server
      run: |
        npm ci
        # Force a clean .env file creation
        rm -f .env
        touch .env
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
        echo "PORT=5000" >> .env
        echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> .env
        echo "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" >> .env
        echo "SENDGRID_FROM_NAME=${{ secrets.SENDGRID_FROM_NAME }}" >> .env
        echo "SENDGRID_REPLY_TO=${{ secrets.SENDGRID_REPLY_TO }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "GEMINI_VISION_MODEL=${{ secrets.GEMINI_VISION_MODEL }}" >> .env
        echo "ALLOW_TESSERACT_FALLBACK=${{ secrets.ALLOW_TESSERACT_FALLBACK }}" >> .env

    # 3. Clean up PM2 and Restart
    - name: Deploy with PM2
      run: |
        # Kill the "api" process to free port 5000
        pm2 delete api || true
        # Start or Restart the "server" process
        pm2 restart server --update-env || pm2 start server/server.js --name server
