name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    # 1. Create Frontend Production Environment
    - name: Setup Frontend Environment
      run: |
        echo "VITE_API_URL=http://3.239.89.39:5000/api" > .env.production

    # 2. Build Frontend
    - name: Install Frontend Dependencies & Build
      run: |
        npm ci
        npm run build

    # 3. Setup Backend Environment
    - name: Setup Backend Environment
      working-directory: ./server
      run: |
        npm ci
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
        echo "PORT=5000" >> .env
        echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> .env
        echo "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" >> .env
        echo "SENDGRID_FROM_NAME=${{ secrets.SENDGRID_FROM_NAME }}" >> .env
        echo "SENDGRID_REPLY_TO=${{ secrets.SENDGRID_REPLY_TO }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "GEMINI_VISION_MODEL=${{ secrets.GEMINI_VISION_MODEL }}" >> .env
        echo "ALLOW_TESSERACT_FALLBACK=${{ secrets.ALLOW_TESSERACT_FALLBACK }}" >> .env

    # 4. Deploy Frontend Build
    - name: Deploy Frontend
      run: |
        sudo rm -rf /var/www/html/*
        sudo cp -r dist/* /var/www/html/

    # 5. Restart Backend with PM2
    - name: Deploy Backend with PM2
      working-directory: ./server
      run: |
        # Use 'api' as the name to match your manual setup
        pm2 restart api --update-env || pm2 start server.js --name api
        pm2 save
