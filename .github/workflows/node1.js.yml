name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- FRONTEND SECTION ---
    - name: Build Frontend
      run: |
        npm ci
        echo "VITE_API_URL=http://18.189.3.216:5000/api" > .env.production
        npm run build

    - name: Deploy Frontend to Nginx
      run: |
        sudo rm -rf /var/www/html/*
        sudo cp -r dist/* /var/www/html/
        sudo systemctl restart nginx || true

    # --- BACKEND SECTION ---
    - name: Setup Backend & Environment
      working-directory: ./server
      run: |
        npm ci
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
        echo "PORT=5000" >> .env
        echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> .env
        echo "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" >> .env
        echo "SENDGRID_FROM_NAME=${{ secrets.SENDGRID_FROM_NAME }}" >> .env
        echo "SENDGRID_REPLY_TO=${{ secrets.SENDGRID_REPLY_TO }}" >> .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "GEMINI_VISION_MODEL=${{ secrets.GEMINI_VISION_MODEL }}" >> .env
        echo "ALLOW_TESSERACT_FALLBACK=${{ secrets.ALLOW_TESSERACT_FALLBACK }}" >> .env

    - name: Deploy Backend with PM2
      run: |
        # Navigating to server folder to ensure PM2 picks up the right context
        cd server
        pm2 restart server --update-env || pm2 start server.js --name server
        pm2 save
